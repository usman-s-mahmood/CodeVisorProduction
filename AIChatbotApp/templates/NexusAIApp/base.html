<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus Suite{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code&display=swap" rel="stylesheet">
    
    <style>
        /* Global Reset & Base Styling */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #00d2ff;
            --neon-purple: #a855f7;
        }

        body {
            background-color: #090a0f;
            color: #f1f1f1;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Shared Glass Navbar */
        .nexus-nav {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand-logo {
            font-weight: 800;
            letter-spacing: 2px;
            text-decoration: none;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--neon-blue);
        }

        /* Scrollbar Styling for all apps */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="nexus-nav">
        <a href="/" class="brand-logo">NEXUS_CORE</a>
        <div class="nav-links">
            <a href="/compiler/"><i class="bi bi-code-square"></i> Compiler</a>
            <a href="/ai/"><i class="bi bi-robot"></i> AI Chat</a>
            {% if user.is_authenticated %}
                <span class="ms-3 text-muted">| {{ user.username }}</span>
                <a href="/logout/" class="text-danger"><i class="bi bi-box-arrow-right"></i></a>
            {% else %}
                <a href="/login/">Login</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
