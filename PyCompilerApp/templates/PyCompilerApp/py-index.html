{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeVisor Live Python IDE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'PyCompilerApp/style.css' %}">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">CodeVisor</a>
            <div class="d-flex align-items-center">
                <button class="btn run-btn" onclick="runCode()">RUN</button>
            </div>
        </div>
    </nav>

    <div class="main-container">
        
        <div class="glass-panel w-50">
            <div class="panel-header">
                <span>main.py</span>
                <span class="text-muted">Python 3.12</span>
            </div>
            <div id="editor"></div>
        </div>

        <div class="glass-panel w-50">
            <div class="panel-header">
                <span>Terminal Output</span>
                <span class="text-white">Standard IO</span>
            </div>
            <div id="console-container">
                <div id="console" tabindex="0"></div>
            </div>
        </div>

    </div>

    <script src="{% static 'PyCompilerApp/main.js' %}"></script>
</body>
</html>
