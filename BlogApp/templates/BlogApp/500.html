{% extends "BlogApp/base.html" %}
{% block body %}

<!-- Page Header Start -->
<div class="container-fluid page-header mb-5 py-5">
    <div class="container">
        <h1 class="display-3 text-white mb-3 animated slideInDown">Internal Server Error</h1>
        <nav aria-label="breadcrumb animated slideInDown">
            <ol class="breadcrumb text-uppercase">
                <li class="breadcrumb-item"><a class="text-white" href="#">Home</a></li>
                <li class="breadcrumb-item"><a class="text-white" href="#">Error</a></li>
                <li class="breadcrumb-item text-white active" aria-current="page">500 Internal Server Error</li>
            </ol>
        </nav>
    </div>
</div>


        <!-- 404 Start -->
        <div class="container-fluid py-5">
            <div class="container py-5 text-center">
                <div class="row justify-content-center">
                    <div class="col-lg-6 wow fadeInUp" data-wow-delay="0.3s">
                        <i class="bi bi-exclamation-triangle display-1 text-primary"></i>
                        <h1 class="display-1">500</h1>
                        <h1 class="mb-4">Internal Server Error</h1>
                        <p class="mb-4">We’re sorry, the server ran into a problem, please try again by refreshing</p>
                        <a class="btn btn-primary py-3 px-5" href="/">Go Back To Home</a>
                    </div>
                </div>
            </div>
        </div>
        <!-- 404 End -->
{% endblock %}
