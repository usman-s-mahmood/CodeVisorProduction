{% extends "BlogApp/base.html" %}

{% block body %}
<!-- Page Header Start -->
<div class="container-fluid page-header mb-5 py-5">
    <div class="container">
        <h1 class="display-3 text-white mb-3 animated slideInDown">Edit Profile</h1>
        <!-- Breadcrumb omitted for brevity -->
    </div>
</div>

<br>
<div class="container">
    <form action="" method="POST" enctype="multipart/form-data" class="p-4 border rounded shadow-sm bg-light">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary w-100 mt-3" type="submit">Submit Profile</button>
    </form>
</div>
<br>

<!-- MAGIC JAVASCRIPT TO HIDE/SHOW STUDENT FIELDS AND HIDE ROLE -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const roleSelect = document.getElementById('id_role');
        const studentFields = document.querySelectorAll('.student-field');

        function toggleFields() {
            if (roleSelect.value === 'recruiter') {
                // If recruiter, hide the parent <p> tag of the student fields
                studentFields.forEach(field => {
                    field.closest('p').style.display = 'none';
                });
            } else {
                // If student, show them
                studentFields.forEach(field => {
                    field.closest('p').style.display = 'block';
                });
            }
        }

        // Run on page load
        toggleFields();

        // HIDE THE ROLE FIELD ENTIRELY ON THE EDIT PAGE
        // This hides the dropdown, the label, and the help text
        if (roleSelect) {
            roleSelect.closest('p').style.display = 'none';
        }
    });
</script>

{% endblock body %}
